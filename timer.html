    <body>
        <div class="timer" class="widgets">
        <div class="timer-stuff">
            <h1>pomodoro timer ⋆｡°✩</h1>
            <button class="pomo-buttons" id="focus">focus</button>
            <button class="pomo-buttons" id="sbreak">short break</button>
            <button class="pomo-buttons" id="lbreak">long break</button>
        </div>



        <main>
            <div class="pomodoro">
                <div id="focus-timer" class="tdisplay" data-duration="25.00">
                    <h1 class="time">25:00</h1>
                </div>
                <div id="sbreak-timer" class="tdisplay" data-duration="5.00">
                    <h1 class="time">5:00</h1>
                </div>
                <div id="lbreak-timer" class="tdisplay" data-duration="10.00">
                    <h1 class="time">10:00</h1>
                 </div>
                
                </div>
                <div class="controls">
                    <button id="start" class="pomo-buttons">start</button>
                    <button id="stop" class="pomo-buttons">stop</button>
                    <p>(if you leave the tab the timer resets!)</p>
                </div>
            </div>

        </main>
        <script src="timerscript.js"></script>


    </body>
